<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Login - Online Book Store</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:10px 20px;
background:#3498db;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="text" id="username" placeholder="Username"><br>

<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="msg" style="color:red"></p>

</div>

<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="1234"){

window.location="onlinebookstore.html";

}else{

document.getElementById("msg").innerText="Invalid Username or Password";

}

}

</script>

</body>
</html>
